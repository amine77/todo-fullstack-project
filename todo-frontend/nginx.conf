# nginx.conf — Configuration Nginx pour le frontend en production (Docker)
#
# Rôle : servir les fichiers statiques du build React ET proxifier
# les requêtes /api/* vers le service backend Spring Boot.
#
# Sans ce fichier, les requêtes vers /api depuis le navigateur atterriraient
# sur Nginx qui ne connaît pas cette route et retournerait une 404.
# Grâce au bloc `proxy_pass`, Nginx joue le rôle de reverse-proxy :
# le navigateur ne communique qu'avec une seule origine (localhost:3001),
# ce qui supprime entièrement les problèmes CORS côté production.

server {
    listen 80;
    server_name localhost;

    # Répertoire racine des fichiers statiques générés par `npm run build`
    root /usr/share/nginx/html;
    index index.html;

    # ── Application React (SPA) ──────────────────────────────────────────────
    # try_files : cherche d'abord le fichier exact, puis le dossier,
    # et si rien n'est trouvé, renvoie index.html (nécessaire pour le routage
    # côté client si React Router est utilisé).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API → Backend Spring Boot ─────────────────────────────────────
    # Toutes les requêtes commençant par /api sont transmises au service
    # "backend" sur le réseau Docker interne (nom de service dans docker-compose.yml).
    location /api {
        proxy_pass http://backend:8080;

        # Transmet les en-têtes originaux pour que le backend connaisse
        # l'IP réelle du client, le protocole utilisé, etc.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
